# Fix colors
set-option -sa terminal-overrides ',xterm-*:Tc'

# Set prefix to Ctrl Space
unbind C-b
set-option -g prefix C-Space

# Enable mouse
set -g mouse on

# Enable extended keys (allows Shift+Enter passthrough for Claude Code)
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Shift arrow keys to switch windows
bind -n S-Left select-window -t :-
bind -n S-Right select-window -t :+

# Open panes and windows in the current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'

set -g @rose_pine_host 'on' # Enables hostname in the status bar
set -g @rose_pine_date_time '%m-%d-%y %H:%M' # It accepts the date UNIX command format (man date for info)
set -g @rose_pine_user 'on' # Turn on the username component in the statusbar
set -g @rose_pine_directory 'on' # Turn on the current folder component in the status bar
set -g @rose_pine_bar_bg_disable 'on' # Disables background color, for transparent terminal emulators

set -g @rose_pine_disable_active_window_menu 'on' # Disables the menu that shows the active window on the left
# NOTE: rose-pine checks this with [[ "$val" ]], so ANY non-empty value (even 'off') forces the
# directory as the window name. Must be empty / removed to show the name set via rename-window (#W).
set -g @rose_pine_show_pane_directory '' # empty = show window names; 'on' = force current directory

set -g @rose_pine_status_left_append_section '#{?window_zoomed_flag,#[fg=yellow]🔍,}' # Appends a section to the left of the status bar that shows if the window is zoomed

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
